<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Flashcards</title>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
        <link rel="stylesheet" href="index.css">
    </head>
    

    <body>
        <div class="container">

            <div class="add-flashcard-con">
                <button id="add-flashcard-con">Adicionar Flashcard</button>
            </div>

            <div id="card-container">
                <div class="card-list-container"></div>
            </div>

        </div>

        <div class="question-container hide" id="add-question-card">
            <h2>Adicionar Flashcard</h2>
            <div class="wrapper">
                <div class="error">
                    <span class="hide" id="error">Locais de preenchimento não podem estar vazios!</span>
                </div>
                <i class="fa-solid fa-xmark" id="close-btn"></i>
            </div>
            
            <label for="question">Pergunta:</label>
            <textarea 
            class="input" 
            id="question" 
            placeholder="Escreva a pergunta aqui." 
            rows="2"></textarea>
            
            <label for="answer">Resposta:</label>
            <textarea 
            class="input" 
            id="answer" 
            rows="4" 
            placeholder="Escreva a resposta aqui."></textarea>

            <button id="save-btn">Salvar</button>

        </div>

        <script src="index.js"></script>

    </body>
</html>
